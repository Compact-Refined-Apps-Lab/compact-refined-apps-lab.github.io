<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Support and privacy information for CelCue, an offline X-sheet and animation timing workspace.">
  <title>CelCue</title>
  <style>
    :root { color-scheme:light; --ink:#25232e; --violet:#7255a6; --paper:#f7f5fa; --card:#fff; --line:#e3ddec; }
    * { box-sizing:border-box; }
    body { margin:0; font:17px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:var(--paper); }
    main { width:min(720px,calc(100% - 40px)); margin:0 auto; padding:72px 0 88px; }
    h1 { margin:18px 0 10px; font:650 clamp(40px,8vw,62px)/1.02 Georgia,serif; }
    p { color:#676171; }
    a { color:var(--violet); font-weight:700; }
    .mark { display:grid; place-items:center; width:60px; height:60px; border-radius:19px; color:#fff; background:var(--violet); font-size:26px; }
    .links { display:grid; gap:14px; margin-top:30px; }
    .card { display:block; padding:22px; border:1px solid var(--line); border-radius:20px; color:var(--ink); background:var(--card); text-decoration:none; }
    .card span { display:block; color:#746d7d; font-weight:400; }
  </style>
</head>
<body>
<main>
  <div class="mark" aria-hidden="true">▦</div>
  <h1>CelCue</h1>
  <p>Offline X-sheet planning, exposure timing, cue markers, visual rehearsal, diagnostics, and handoff exports for iPhone and iPad.</p>
  <div class="links">
    <a class="card" href="support/"><strong>Support</strong><span>Workflow guidance, product limits, and contact information.</span></a>
    <a class="card" href="privacy/"><strong>Privacy Policy</strong><span>What stays on your device and what happens when you contact support.</span></a>
  </div>
</main>
</body>
</html>
