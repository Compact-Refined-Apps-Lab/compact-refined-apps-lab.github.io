<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ChangePlot: Wardrobe support and privacy information.">
  <title>ChangePlot: Wardrobe</title>
  <style>
    :root { color-scheme:light; --ink:#28221f; --accent:#b54b36; --green:#2d7254; --paper:#f7f5f2; --card:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; font:17px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:var(--paper); }
    main { width:min(760px,calc(100% - 40px)); margin:0 auto; padding:64px 0 80px; }
    img { width:76px; height:76px; border-radius:18px; }
    h1 { margin:18px 0 10px; font:650 clamp(38px,7vw,58px)/1.05 Georgia,serif; }
    p { margin:0 0 28px; color:#675c55; }
    nav { display:flex; flex-wrap:wrap; gap:12px; }
    a { display:inline-block; padding:12px 17px; border-radius:14px; color:#fff; background:var(--green); font-weight:750; text-decoration:none; }
    a.secondary { color:var(--green); background:var(--card); border:1px solid #ded7d1; }
  </style>
</head>
<body>
<main>
  <img src="app-icon.png" alt="ChangePlot app icon">
  <h1>Plan the change.<br>Rehearse the real work.</h1>
  <p>ChangePlot: Wardrobe is an offline costume quick-change planner for theatre and live production.</p>
  <nav aria-label="Product information">
    <a href="support/">Support</a>
    <a class="secondary" href="privacy/">Privacy Policy</a>
  </nav>
</main>
</body>
</html>
