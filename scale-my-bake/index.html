<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Support and privacy information for Scale My Bake.">
  <title>Scale My Bake</title>
  <style>
    :root { color-scheme:light; --ink:#2b241f; --orange:#c94f2d; --paper:#fbf7f1; --card:#fffdf9; }
    * { box-sizing:border-box; }
    body { margin:0; font:17px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:var(--paper); }
    main { width:min(720px,calc(100% - 40px)); margin:0 auto; padding:72px 0 88px; }
    h1 { margin:18px 0 10px; font:650 clamp(40px,8vw,62px)/1.02 Georgia,serif; }
    p { color:#675b52; }
    a { color:var(--orange); font-weight:700; }
    .mark { display:grid; place-items:center; width:60px; height:60px; border-radius:19px; color:#fff; background:var(--orange); font-size:29px; }
    .links { display:grid; gap:14px; margin-top:30px; }
    .card { display:block; padding:22px; border:1px solid #e7ddd2; border-radius:20px; color:var(--ink); background:var(--card); text-decoration:none; }
    .card span { display:block; color:#74685f; font-weight:400; }
  </style>
</head>
<body>
<main>
  <div class="mark" aria-hidden="true">×</div>
  <h1>Scale My Bake</h1>
  <p>Offline recipe scaling, pan comparison, baker’s percentages, and kitchen-unit conversion for iPhone and iPad.</p>
  <div class="links">
    <a class="card" href="support/"><strong>Support</strong><span>Answers, usage guidance, and contact information.</span></a>
    <a class="card" href="privacy/"><strong>Privacy Policy</strong><span>What stays on your device and what happens when you contact support.</span></a>
  </div>
</main>
</body>
</html>
