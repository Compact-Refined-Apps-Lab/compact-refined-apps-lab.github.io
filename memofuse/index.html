<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Support and privacy information for MemoFuse: Audio Merger.">
  <title>MemoFuse: Audio Merger</title>
  <style>
    :root { color-scheme:light; --ink:#202833; --blue:#386b94; --amber:#c5792f; --paper:#f6f7f8; --card:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; font:17px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:var(--paper); }
    main { width:min(720px,calc(100% - 40px)); margin:0 auto; padding:72px 0 88px; }
    h1 { margin:18px 0 10px; font:650 clamp(40px,8vw,62px)/1.02 Georgia,serif; }
    p { color:#606a75; }
    a { color:var(--blue); font-weight:700; }
    .mark { display:grid; place-items:center; width:60px; height:60px; border-radius:19px; color:#fff; background:var(--blue); font-size:27px; }
    .links { display:grid; gap:14px; margin-top:30px; }
    .card { display:block; padding:22px; border:1px solid #dfe4e8; border-radius:20px; color:var(--ink); background:var(--card); text-decoration:none; }
    .card span { display:block; color:#68737d; font-weight:400; }
  </style>
</head>
<body>
<main>
  <div class="mark" aria-hidden="true">〽</div>
  <h1>MemoFuse</h1>
  <p>Arrange, trim, fade, and merge recordings into one M4A file—privately and entirely on your iPhone or iPad.</p>
  <div class="links">
    <a class="card" href="support/"><strong>Support</strong><span>Import guidance, editing tips, compatibility, and contact information.</span></a>
    <a class="card" href="privacy/"><strong>Privacy Policy</strong><span>What stays on your device and what happens when you contact support.</span></a>
  </div>
</main>
</body>
</html>
